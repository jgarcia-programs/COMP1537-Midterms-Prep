<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Midterm Practice</title>
  </head>
  <body>
    <!-- UNIVERSAL CONTAINER -->
    <div class="bg-[#222222]">
      <!-- HEADER SECTION -->
      <header class="text-[#fff] p-5">
        <!-- header - NAVBAR SECTION -->
        <nav class="flex justify-between items-center">
          <h1>company name</h1>
          <section id="right-navbar" class="flex items-center gap-5">
            <h2 class="font-semibold">Let's talk</h2>
            <input
              type="button"
              value="Join the club"
              class="bg-yellow-400 rounded-full px-4 py-2 text-[#222222]"
              id=""
            />
          </section>
        </nav>
        <!-- header - CONTENT SECTION -->
        <section class="max-w-[768px] mx-auto flex items-center gap-10 py-20">
          <!-- content - TITLE -->
          <div>
            <h2 class="text-6xl font-extrabold">Get a website.</h2>
            <h2 class="text-6xl font-extrabold text-yellow-400">
              Skip the drama
            </h2>
          </div>

          <!-- content - LIST -->
          <ul>
            <li class="flex gap-5">
              <svg
                class="text-yellow-400"
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="icon icon-tabler icons-tabler-outline icon-tabler-table-shortcut"
              >
                <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                <path
                  d="M3 13v-8a2 2 0 0 1 2 -2h14a2 2 0 0 1 2 2v14a2 2 0 0 1 -2 2h-8"
                />
                <path d="M3 10h18" />
                <path d="M10 3v11" />
                <path d="M2 22l5 -5" />
                <path d="M7 21.5v-4.5h-4.5" />
              </svg>
              <p class="text-2xl font-medium">Killer Design</p>
            </li>
            <li class="flex gap-5">
              <svg
                class="text-yellow-400"
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="icon icon-tabler icons-tabler-outline icon-tabler-grain"
              >
                <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                <path d="M4.5 9.5m-1 0a1 1 0 1 0 2 0a1 1 0 1 0 -2 0" />
                <path d="M9.5 4.5m-1 0a1 1 0 1 0 2 0a1 1 0 1 0 -2 0" />
                <path d="M9.5 14.5m-1 0a1 1 0 1 0 2 0a1 1 0 1 0 -2 0" />
                <path d="M4.5 19.5m-1 0a1 1 0 1 0 2 0a1 1 0 1 0 -2 0" />
                <path d="M14.5 9.5m-1 0a1 1 0 1 0 2 0a1 1 0 1 0 -2 0" />
                <path d="M19.5 4.5m-1 0a1 1 0 1 0 2 0a1 1 0 1 0 -2 0" />
                <path d="M14.5 19.5m-1 0a1 1 0 1 0 2 0a1 1 0 1 0 -2 0" />
                <path d="M19.5 14.5m-1 0a1 1 0 1 0 2 0a1 1 0 1 0 -2 0" />
              </svg>
              <p class="text-2xl font-medium">Painless Process</p>
            </li>
            <li class="flex gap-5">
              <svg
                class="text-yellow-400"
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="icon icon-tabler icons-tabler-outline icon-tabler-clock"
              >
                <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                <path d="M3 12a9 9 0 1 0 18 0a9 9 0 0 0 -18 0" />
                <path d="M12 7v5l3 3" />
              </svg>
              <p class="text-2xl font-medium">Strategic Updates</p>
            </li>
          </ul>
        </section>
      </header>
    </div>
  </body>
</html>
